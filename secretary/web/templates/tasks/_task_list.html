{# Partial: full task list (swapped by HTMX filter) #}
{% if tasks %}
<div class="space-y-2">
  {% for task in tasks %}
    {% include "tasks/_task_row.html" %}
  {% endfor %}
</div>
{% else %}
<div class="bg-white rounded-xl border border-slate-200 p-12 text-center shadow-sm">
  <svg class="w-12 h-12 mx-auto text-slate-300 mb-3" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
  <p class="text-slate-500 font-medium">No tasks found</p>
  <p class="text-slate-400 text-sm mt-1">Create a new task to get started.</p>
  <a href="/web/tasks/new"
     class="inline-flex items-center gap-1.5 mt-4 px-4 py-2 bg-accent text-white text-sm font-medium rounded-lg hover:bg-accent-dark transition">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
    New Task
  </a>
</div>
{% endif %}
