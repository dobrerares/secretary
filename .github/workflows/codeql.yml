name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "20 7 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended

      - uses: github/codeql-action/analyze@v4
